<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register | Secure Messaging</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="bg-overlay"></div>

<header class="topbar">
  <div class="logo-wrap">
    <div class="logo-shield">S</div>
    <div>
      <h1 class="site-title">Secure Messaging System</h1>
      <p class="site-subtitle">Register Account</p>
    </div>
  </div>

  <nav class="nav-links">
    <a href="/">Home</a>
    <a href="/login.html">Login</a>
  </nav>
</header>

<main class="container">
  <section class="auth-wrapper">
    <div class="auth-card">
      <p class="eyebrow">Secure Registration</p>
      <h2>Create New Account</h2>

      <form id="registerForm" class="auth-form">

        <div class="form-group">
          <label>Username</label>
          <input type="text" id="regUsername" required>
        </div>

        <div class="form-group">
          <label>Password</label>
          <input type="password" id="regPassword" required>
        </div>

        <button class="primary-btn">Register</button>

        <p id="registerMessage" class="form-message"></p>

      </form>

      <p class="auth-switch">
        Already have an account?
        <a href="/login.html">Login here</a>
      </p>

    </div>
  </section>
</main>

<script src="script.js"></script>

</body>
</html>
