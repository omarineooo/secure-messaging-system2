<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Secure Messaging System</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .login-wrap {
      width: min(1100px, calc(100% - 32px));
      margin: 28px auto 60px;
    }

    .login-hero {
      text-align: center;
      padding: 40px 20px 24px;
    }

    .login-hero .eyebrow {
      color: var(--blue);
      text-transform: uppercase;
      letter-spacing: 2px;
      font-size: 13px;
      margin-bottom: 14px;
    }

    .login-hero h2 {
      margin: 0 0 16px;
      font-size: clamp(34px, 5vw, 58px);
    }

    .login-hero p {
      width: min(760px, 100%);
      margin: 0 auto;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.9;
    }

    .login-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 22px;
      margin-top: 26px;
    }

    .login-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 22px;
      backdrop-filter: blur(12px);
      box-shadow: var(--glow);
      padding: 28px;
    }

    .login-card h3 {
      margin-top: 0;
      margin-bottom: 18px;
      color: var(--blue);
      font-size: 28px;
    }

    .form-group {
      display: grid;
      gap: 8px;
      margin-bottom: 16px;
    }

    .form-group label {
      font-weight: 600;
      color: var(--text);
    }

    .form-group input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 14px;
      border: 1px solid rgba(56, 189, 248, 0.2);
      background: rgba(2, 6, 23, 0.88);
      color: var(--text);
      font-size: 15px;
      outline: none;
    }

    .form-group input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.12);
    }

    .primary-btn {
      border: none;
      border-radius: 14px;
      padding: 14px 18px;
      font-size: 15px;
      font-weight: 700;
      color: white;
      cursor: pointer;
      background: linear-gradient(135deg, #0ea5e9, #2563eb);
      box-shadow: 0 0 20px rgba(37, 99, 235, 0.24);
    }

    .form-message {
      min-height: 22px;
      margin: 14px 0 0;
      font-size: 14px;
    }

    @media (max-width: 900px) {
      .login-grid {
        grid-template-columns: 1fr;
      }

      .login-hero {
        text-align: left;
        padding-left: 0;
        padding-right: 0;
      }

      .login-hero p {
        margin: 0;
      }
    }
  </style>
</head>
<body>
  <div class="grid-bg"></div>

  <header class="topbar">
    <div class="brand">
      <div class="logo">S</div>
      <div>
        <h1>Secure Messaging System</h1>
        <p>Secure Login & Registration</p>
      </div>
    </div>

    <nav class="nav">
      <a href="index.html">Home</a>
      <a href="project.html">Project</a>
      <a href="team.html">Team</a>
      <a href="login.html" class="active">Login / Register</a>
      <a href="compose.html">Compose</a>
      <a href="inbox.html">Inbox</a>
    </nav>
  </header>

  <main class="login-wrap">
    <section class="login-hero">
      <p class="eyebrow">Secure Access</p>
      <h2>Login / Register</h2>
      <p>
        Access your secure account or create a new one to send and receive private messages.
      </p>
    </section>

    <section class="login-grid">
      <div class="login-card">
        <h3>Login</h3>

        <div class="form-group">
          <label for="loginUsername">Username</label>
          <input id="loginUsername" type="text" placeholder="Enter username" />
        </div>

        <div class="form-group">
          <label for="loginPassword">Password</label>
          <input id="loginPassword" type="password" placeholder="Enter password" />
        </div>

        <button class="primary-btn" onclick="login()">Login</button>
        <p id="loginMessage" class="form-message"></p>
      </div>

      <div class="login-card">
        <h3>Register</h3>

        <div class="form-group">
          <label for="registerUsername">Username</label>
          <input id="registerUsername" type="text" placeholder="Choose username" />
        </div>

        <div class="form-group">
          <label for="registerPassword">Password</label>
          <input id="registerPassword" type="password" placeholder="Choose password" />
        </div>

        <button class="primary-btn" onclick="registerUser()">Register</button>
        <p id="registerMessage" class="form-message"></p>
      </div>
    </section>
  </main>

  <script>
    async function login() {
      const username = document.getElementById("loginUsername").value.trim();
      const password = document.getElementById("loginPassword").value.trim();
      const msg = document.getElementById("loginMessage");

      if (!username || !password) {
        msg.textContent = "Please enter username and password";
        msg.style.color = "red";
        return;
      }

      try {
        const res = await fetch("/api/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password })
        });

        const data = await res.json();

        msg.textContent = data.message;
        msg.style.color = data.success ? "lightgreen" : "red";

        if (data.success) {
          localStorage.setItem("user", username);
          setTimeout(() => {
            window.location.href = "dashboard.html";
          }, 500);
        }
      } catch (error) {
        msg.textContent = "Login failed";
        msg.style.color = "red";
      }
    }

    async function registerUser() {
      const username = document.getElementById("registerUsername").value.trim();
      const password = document.getElementById("registerPassword").value.trim();
      const msg = document.getElementById("registerMessage");

      if (!username || !password) {
        msg.textContent = "Please enter username and password";
        msg.style.color = "red";
        return;
      }

      try {
        const res = await fetch("/api/register", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password })
        });

        const data = await res.json();

        msg.textContent = data.message;
        msg.style.color = data.success ? "lightgreen" : "red";
      } catch (error) {
        msg.textContent = "Register failed";
        msg.style.color = "red";
      }
    }
  </script>
</body>
</html>
